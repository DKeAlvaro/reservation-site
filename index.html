<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anzest Friends & Family</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preload" href="images/logo-anzest.svg" as="image">
    <link rel="preload" href="images/black-goat.svg" as="image">
    <link rel="prefetch" href="reserva.html">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/cascadia-code/index.css">
    <link rel="stylesheet" href="anzest_styles.css">
</head>
<body>
    <div class="splash" id="splash">
        <div class="splash-inner">
            <div class="splash-visual" id="logoLink" onclick="navigateToReserva()" role="button" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')navigateToReserva()">
                <div class="splash-img-wrap">
                    <img class="splash-img" id="logoGif" src="images/logo-anzest.gif" alt="Anzest">
                    <img class="splash-overlay" id="logoSvg" src="images/logo-anzest.svg" alt="Anzest">
                </div>
            </div>
            <p class="splash-subtitle" id="subtitle">
                <span class="splash-goat-wrap" id="goatWrap">
                    <img class="splash-goat" id="goatGif" src="images/black-goat.gif" alt="">
                    <img class="splash-goat goat-overlay" id="goatSvg" src="images/black-goat.svg" alt="">
                </span>
                Inauguración Friends &amp; Family
            </p>
        </div>
    </div>

    <script>
        const ANIMATION_DURATION = 3430;

        function navigateToReserva() {
            document.getElementById('splash').classList.add('fade-out');
            setTimeout(() => {
                location.href = 'reserva.html';
            }, 400);
        }

        function startReveal() {
            document.querySelectorAll('.splash-visual, .splash-goat-wrap').forEach(el => {
                el.classList.add('revealed');
            });
            document.getElementById('subtitle').classList.add('visible');
            document.getElementById('logoLink').classList.add('interactive');
        }

        setTimeout(startReveal, ANIMATION_DURATION);
    </script>
</body>
</html>
